<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrive Body Therapy</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --teal:#31BAB9;
    --green:#ACBC20;
    --gold:#F0B724;
    --text:#2C2C2C;
    --white:#fff;
    --gray:#f5f5f3;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--white);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* HERO */
  .hero{
    background:url('thrive-hero-bg.jpg') center center/cover no-repeat;
    position:relative;
    padding:60px 24px 48px;
    text-align:center;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(25,100,100,0.45);
    pointer-events:none;
  }
  .hero>*{position:relative;z-index:1;}

  .logo{
    height:100px;
    width:auto;
    margin-bottom:12px;
  }
  .tagline{
    color:rgba(255,255,255,0.9);
    font-size:1rem;
    letter-spacing:0.5px;
    margin-bottom:48px;
    font-weight:400;
  }

  /* CARDS */
  .cards{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:420px;
  }
  .card{
    background:rgba(255,255,255,0.97);
    border-radius:20px;
    padding:24px 28px;
    text-align:left;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:18px;
    box-shadow:0 8px 32px rgba(0,0,0,0.15);
    transition:transform 0.2s, box-shadow 0.2s;
    cursor:pointer;
    border:none;
    width:100%;
    font-family:-apple-system,sans-serif;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 40px rgba(0,0,0,0.2);
  }
  .card:active{transform:translateY(0)}

  .card-icon{
    width:54px;
    height:54px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6rem;
    flex-shrink:0;
  }
  .card-icon.massage{background:linear-gradient(135deg,var(--teal),#279e9d);}
  .card-icon.pilates{background:linear-gradient(135deg,var(--green),#8fa010);}

  .card-text{flex:1;}
  .card-title{
    font-size:1.1rem;
    font-weight:700;
    color:var(--text);
    margin-bottom:3px;
  }
  .card-sub{
    font-size:.85rem;
    color:#888;
    font-weight:400;
  }
  .card-arrow{
    font-size:1.3rem;
    color:#ccc;
  }

  .coming-soon{
    display:inline-block;
    background:var(--gold);
    color:#fff;
    font-size:.65rem;
    font-weight:700;
    letter-spacing:.5px;
    padding:2px 8px;
    border-radius:20px;
    margin-left:6px;
    vertical-align:middle;
    text-transform:uppercase;
  }

  /* FOOTER */
  .footer{
    position:relative;
    z-index:1;
    text-align:center;
    padding-bottom:40px;
    margin-top:32px;
  }
  .footer p{
    color:rgba(255,255,255,0.6);
    font-size:.8rem;
  }
  .footer a{
    color:rgba(255,255,255,0.75);
    text-decoration:none;
  }
</style>
</head>
<body>

<div class="hero">
  <img src="thrive-logo-white.png" alt="Thrive Body Therapy" class="logo">
  <p class="tagline">Your wellness, your way.</p>

  <div class="cards">
    <!-- Massage Therapy -->
    <a href="https://thrivebodytherapy.janeapp.com" class="card" target="_blank" rel="noopener">
      <div class="card-icon massage">🙌</div>
      <div class="card-text">
        <div class="card-title">Massage Therapy</div>
        <div class="card-sub">Book RMT appointments online</div>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <!-- Pilates -->
    <a href="./index.html" class="card">
      <div class="card-icon pilates">🧘‍♀️</div>
      <div class="card-text">
        <div class="card-title">Thrive Pilates <span class="coming-soon">New</span></div>
        <div class="card-sub">Book mat & reformer classes</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>

  <div class="footer">
    <p>Summerland, BC &nbsp;·&nbsp; <a href="mailto:Steph@thrivebodytherapy.com">Steph@thrivebodytherapy.com</a></p>
  </div>
</div>

</body>
</html>
